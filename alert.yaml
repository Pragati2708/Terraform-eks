apiVersion: monitoring.coreos.com/v1
kind: PrometheusRule
metadata:
  name: pod-restart-alert
  namespace: monitoring
spec:
  groups:
    - name: pod-alerts
      rules:
        - alert: PodRestart
          expr: increase(kube_pod_container_status_restarts_total[1m]) > 0
          for: 1m
          labels:
            severity: warning
          annotations:
            summary: "Pod restarted"
            description: "A pod has restarted"
