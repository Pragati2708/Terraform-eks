apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: legacy-service
  namespace: argocd
spec:
  project: default

  source:
    repoURL: https://github.com/Pragati2708/k8s-gitops-config.git
    targetRevision: HEAD
    path: legacy-service

  destination:
    server: https://kubernetes.default.svc
    namespace: uat

  syncPolicy:
    automated:
      prune: true
      selfHeal: true
